spring.application.name=Restaurant-Management-API

spring.datasource.url=jdbc:mysql://db:3306/restaurant_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.hibernate.ddl-auto=create-drop

api.security.token.service=${JWT_SECRET:my-secret-key}